name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build release JAR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Derive release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ -z "${version}" || "${version}" == "${tag}" ]]; then
            echo "Release tags must start with v, for example v0.1.0." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "jar_name=api-test-orchestrator-${tag}.jar" >> "${GITHUB_OUTPUT}"
          echo "checksum_name=api-test-orchestrator-${tag}.jar.sha256" >> "${GITHUB_OUTPUT}"
          echo "native_name=api-test-orchestrator-${tag}-linux-x64.tar.gz" >> "${GITHUB_OUTPUT}"
          echo "native_checksum_name=api-test-orchestrator-${tag}-linux-x64.tar.gz.sha256" >> "${GITHUB_OUTPUT}"

      - name: Set Maven release version
        run: mvn -B org.codehaus.mojo:versions-maven-plugin:2.21.0:set -DnewVersion="${{ steps.release.outputs.version }}" -DgenerateBackupPoms=false

      - name: Run tests
        run: mvn -B test

      - name: Build shaded JAR
        run: mvn -B -DskipTests package

      - name: Verify release JAR contents
        shell: bash
        run: |
          set -euo pipefail

          jar_path="target/api-test-orchestrator-${{ steps.release.outputs.version }}.jar"
          test -f "${jar_path}"

          jar tf "${jar_path}" > jar-contents.txt

          if grep -E "^(com/mysql|com/google/protobuf)|mysql-connector|protobuf-java" jar-contents.txt; then
            echo "Release JAR must not bundle MySQL Connector/J or protobuf-java." >&2
            exit 1
          fi

          grep -Fx "META-INF/LICENSE" jar-contents.txt
          grep -Fx "META-INF/NOTICE" jar-contents.txt
          grep -Fx "META-INF/THIRD-PARTY.txt" jar-contents.txt

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          jar_path="target/api-test-orchestrator-${{ steps.release.outputs.version }}.jar"
          jar_name="${{ steps.release.outputs.jar_name }}"
          checksum_name="${{ steps.release.outputs.checksum_name }}"

          cp "${jar_path}" "${jar_name}"
          sha256sum "${jar_name}" > "${checksum_name}"

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"
          github-token: ${{ github.token }}

      - name: Configure GraalVM Maven toolchain
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.m2"
          cat > "${HOME}/.m2/toolchains.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
              </provides>
              <configuration>
                <jdkHome>${GRAALVM_HOME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Build native binary
        run: mvn -B -Pnative,native-ci -DskipTests org.apache.maven.plugins:maven-toolchains-plugin:3.2.0:toolchain clean package

      - name: Verify native binary
        shell: bash
        run: |
          set -euo pipefail

          native_path="target/api-test-orchestrator"
          test -x "${native_path}"
          test "$("${native_path}" --version)" = "${{ steps.release.outputs.version }}"
          "${native_path}" --help >/tmp/api-test-orchestrator-help.txt

      - name: Prepare native release assets
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/package-native-release.sh \
            target/api-test-orchestrator \
            "${{ steps.release.outputs.tag }}" \
            "${PWD}"

      - name: Verify native release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          native_name="${{ steps.release.outputs.native_name }}"
          native_checksum_name="${{ steps.release.outputs.native_checksum_name }}"
          archive_base="api-test-orchestrator-${tag}-linux-x64"

          test -f "${native_name}"
          test -f "${native_checksum_name}"

          tar -tzf "${native_name}" > native-contents.txt

          grep -Fx "${archive_base}/api-test-orchestrator" native-contents.txt
          grep -Fx "${archive_base}/LICENSE" native-contents.txt
          grep -Fx "${archive_base}/NOTICE" native-contents.txt
          grep -Fx "${archive_base}/THIRD-PARTY.txt" native-contents.txt
          grep -Fx "${archive_base}/licenses/mysql-connector-j/LICENSE" native-contents.txt
          grep -Fx "${archive_base}/licenses/mysql-connector-j/README" native-contents.txt
          grep -Fx "${archive_base}/licenses/mysql-connector-j/INFO_BIN" native-contents.txt
          grep -Fx "${archive_base}/licenses/mysql-connector-j/INFO_SRC" native-contents.txt
          grep -Fx "${archive_base}/licenses/protobuf-java/LICENSE" native-contents.txt

          awk -v file="${native_name}" 'NF == 2 && $2 == file && $1 ~ /^[0-9a-f]{64}$/ { found = 1 } END { exit found ? 0 : 1 }' "${native_checksum_name}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          jar_name="${{ steps.release.outputs.jar_name }}"
          checksum_name="${{ steps.release.outputs.checksum_name }}"
          native_name="${{ steps.release.outputs.native_name }}"
          native_checksum_name="${{ steps.release.outputs.native_checksum_name }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" \
              "${jar_name}" \
              "${checksum_name}" \
              "${native_name}" \
              "${native_checksum_name}" \
              --clobber
          else
            gh release create "${tag}" \
              "${jar_name}" \
              "${checksum_name}" \
              "${native_name}" \
              "${native_checksum_name}" \
              --title "${tag}" \
              --generate-notes \
              --verify-tag
          fi
