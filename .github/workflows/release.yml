name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jar:
    name: Build release JAR
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Derive release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ -z "${version}" || "${version}" == "${tag}" ]]; then
            echo "Release tags must start with v, for example v0.1.0." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "jar_name=api-test-orchestrator-${tag}.jar" >> "${GITHUB_OUTPUT}"
          echo "checksum_name=api-test-orchestrator-${tag}.jar.sha256" >> "${GITHUB_OUTPUT}"

      - name: Set Maven release version
        run: mvn -B org.codehaus.mojo:versions-maven-plugin:2.21.0:set -DnewVersion="${{ steps.release.outputs.version }}" -DgenerateBackupPoms=false

      - name: Run tests
        run: mvn -B test

      - name: Build shaded JAR
        run: mvn -B -DskipTests package

      - name: Verify release JAR contents
        shell: bash
        run: |
          set -euo pipefail

          jar_path="target/api-test-orchestrator-${{ steps.release.outputs.version }}.jar"
          test -f "${jar_path}"

          jar tf "${jar_path}" > jar-contents.txt

          if grep -E "^(com/mysql|com/google/protobuf)|mysql-connector|protobuf-java" jar-contents.txt; then
            echo "Release JAR must not bundle MySQL Connector/J or protobuf-java." >&2
            exit 1
          fi

          grep -Fx "META-INF/LICENSE" jar-contents.txt
          grep -Fx "META-INF/NOTICE" jar-contents.txt
          grep -Fx "META-INF/THIRD-PARTY.txt" jar-contents.txt

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          jar_path="target/api-test-orchestrator-${{ steps.release.outputs.version }}.jar"
          jar_name="${{ steps.release.outputs.jar_name }}"
          checksum_name="${{ steps.release.outputs.checksum_name }}"

          cp "${jar_path}" "${jar_name}"
          sha256sum "${jar_name}" > "${checksum_name}"

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: |
            ${{ steps.release.outputs.jar_name }}
            ${{ steps.release.outputs.checksum_name }}
          if-no-files-found: error
          retention-days: 1

  native:
    name: Build native (${{ matrix.platform }})
    needs: jar
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"
          github-token: ${{ github.token }}

      - name: Configure GraalVM Maven toolchain
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.m2"
          cat > "${HOME}/.m2/toolchains.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
              </provides>
              <configuration>
                <jdkHome>${GRAALVM_HOME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Set Maven release version
        run: mvn -B org.codehaus.mojo:versions-maven-plugin:2.21.0:set -DnewVersion="${{ needs.jar.outputs.version }}" -DgenerateBackupPoms=false

      - name: Build native binary
        run: mvn -B -Pnative,native-ci -DskipTests org.apache.maven.plugins:maven-toolchains-plugin:3.2.0:toolchain clean package

      - name: Verify native binary
        shell: bash
        run: |
          set -euo pipefail

          native_path="target/api-test-orchestrator"
          test -x "${native_path}"
          test "$("${native_path}" --version)" = "${{ needs.jar.outputs.version }}"
          "${native_path}" --help >/tmp/api-test-orchestrator-help.txt

      - name: Prepare native release assets
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/package-native-release.sh \
            target/api-test-orchestrator \
            "${{ needs.jar.outputs.tag }}" \
            "${PWD}" \
            "${{ matrix.platform }}"

      - name: Verify native release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.jar.outputs.tag }}"
          platform="${{ matrix.platform }}"
          archive_base="api-test-orchestrator-${tag}-${platform}"
          native_name="${archive_base}.tar.gz"
          native_checksum_name="${archive_base}.tar.gz.sha256"

          test -f "${native_name}"
          test -f "${native_checksum_name}"

          tar -tzf "${native_name}" > native-contents.txt

          grep -Fx "${archive_base}/api-test-orchestrator" native-contents.txt
          grep -Fx "${archive_base}/LICENSE" native-contents.txt
          grep -Fx "${archive_base}/NOTICE" native-contents.txt
          grep -Fx "${archive_base}/THIRD-PARTY.txt" native-contents.txt
          grep -Fx "${archive_base}/licenses/mysql-connector-j/LICENSE" native-contents.txt
          grep -Fx "${archive_base}/licenses/mysql-connector-j/README" native-contents.txt
          grep -Fx "${archive_base}/licenses/mysql-connector-j/INFO_BIN" native-contents.txt
          grep -Fx "${archive_base}/licenses/mysql-connector-j/INFO_SRC" native-contents.txt
          grep -Fx "${archive_base}/licenses/protobuf-java/LICENSE" native-contents.txt

          awk -v file="${native_name}" 'NF == 2 && $2 == file && $1 ~ /^[0-9a-f]{64}$/ { found = 1 } END { exit found ? 0 : 1 }' "${native_checksum_name}"

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-native-${{ matrix.platform }}
          path: |
            api-test-orchestrator-${{ needs.jar.outputs.tag }}-${{ matrix.platform }}.tar.gz
            api-test-orchestrator-${{ needs.jar.outputs.tag }}-${{ matrix.platform }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release
    needs: [jar, native]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.jar.outputs.tag }}"

          shopt -s nullglob
          assets=(dist/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" \
              --title "${tag}" \
              --generate-notes \
              --verify-tag
          fi
